<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇游戏</h1>
        <div class="score-board">
            <span>得分: <strong id="score">0</strong></span>
            <span>最高分: <strong id="highScore">0</strong></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <button id="startBtn">开始游戏</button>
            <button id="restartBtn" style="display: none;">重新开始</button>
        </div>
        <div class="instructions">
            <p>使用 <strong>↑ ↓ ← →</strong> 或 <strong>W A S D</strong> 控制蛇的移动方向</p>
        </div>
        <div id="gameOver" class="game-over" style="display: none;">
            <h2>游戏结束!</h2>
            <p>你的得分: <span id="finalScore">0</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
